spring.application.name=Spring_Data_JPA_Demo
server.port=9092
# PostgreSQL database connection URL, port 5432 is the default
spring.datasource.url=jdbc:postgresql://localhost:5433/SchoolDB

# Database username and password
spring.datasource.username=postgres
spring.datasource.password=1234

# Specifies the driver class name (optional in modern Spring Boot versions due to autoconfiguration
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings (JPA provider)
# Automatically creates or updates the database schema based on entities
spring.jpa.hibernate.ddl-auto=update

# Allows  Hibernate to generate SQL optimized for PostgreSQL
# Note: For modern Spring Boot and Hibernate, this might be automatically picked up
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Shows SQL queries generated by Hibernate in the console (helpful for debugging)
spring.jpa.show-sql=true
